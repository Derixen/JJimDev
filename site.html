<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JJim.dev | Site Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="jimbg min-h-screen flex items-start justify-center font-sans antialiased"
  >
    <div
      class="grid grid-cols-1 md:grid-cols-4 gap-4 max-w-5xl mx-auto w-full px-4 mt-8"
    >
      <div
        class="md:col-span-4 jimboxbg p-4 rounded-xl border border-slate-700 text-center"
      >
        <div class="jim-title-text tracking-wider">
          Website of
          <span class="highlight-text-h1">Jim</span>
        </div>
        <div class="jim-subtitle-text">
          From tier-1 technical support to software architect—documenting
          automation workflows, system configurations, and IT engineering best
          practices.
        </div>
      </div>

      <div
        class="md:col-span-1 jimboxbg p-6 rounded-xl border border-slate-700"
      >
        <div id="button-container" class="flex flex-col gap-4 w-full"></div>
      </div>

      <div
        class="md:col-span-3 jimboxbg p-6 rounded-xl border border-slate-700 text-slate-200"
      >
        <div id="main-content-display">
          <h2>Select a Topic</h2>
          <p class="text-slate-500">
            Click a sub-item from the navigation panel on the left to load
            documentation and scripting parameters.
          </p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
